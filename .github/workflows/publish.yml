name: publish
# (re-trigger workflow registration)

# Cloud-Zeitplan fuer @allinwealth (US-Publikum!): prueft die Datei-Queue (queue.json) und postet
# faellige Eintraege. PC muss NICHT laufen. Manuell testbar ueber "Run workflow".
on:
  schedule:
    # Alle ~20 Min in US-aktiven Stunden, versetzte Minuten (:04/:24/:44).
    # 12-23 UTC = 07-18 Uhr US-Ostkueste (Morgen bis frueher Abend),
    # 0-3 UTC   = 19-22 Uhr US-Ostkueste (Prime Time).
    # NICHT :00/:30 nehmen (GitHub-Hoechstlast -> Laeufe werden verworfen).
    # Budget: 16 h x 3 Laeufe = ~1440 Laeufe/Monat -> im 2000-Min-Freitier.
    # GitHub-Cron bleibt "best effort" (kann etwas spaeter feuern) -> cron-job.org als Wecker.
    - cron: "4,24,44 0-3,12-23 * * *"
  workflow_dispatch: {}

# Nur EIN Lauf gleichzeitig — verhindert doppelte Posts durch ueberlappende Laeufe (16.06.).
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python poster.py
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          UPLOADPOST_API_KEY: ${{ secrets.UPLOADPOST_API_KEY }}
          UPLOADPOST_PROFILE: ${{ secrets.UPLOADPOST_PROFILE }}
          # Phase 2/3: YT_* / TIKTOK_* Secrets hier ergaenzen
      - name: Queue-Status zurueckschreiben (queue.json committen)
        if: always()
        run: |
          git config user.name "queue-bot"
          git config user.email "queue-bot@users.noreply.github.com"
          git add queue.json
          if git diff --cached --quiet; then echo "keine Queue-Aenderung"; exit 0; fi
          git commit -m "queue: Status-Update (Cloud-Lauf)"
          for i in 1 2 3; do git push && exit 0; git pull --rebase; done
          exit 1
